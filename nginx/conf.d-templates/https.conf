server {
    listen 443 ssl http2;
    server_name plshow.cn www.plshow.cn;

    ssl_certificate /etc/letsencrypt/live/plshow.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/plshow.cn/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    include /etc/nginx/snippets/app-locations.conf;
}
