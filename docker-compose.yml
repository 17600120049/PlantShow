version: '3.8'

services:
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: plant-show-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-plant_show}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - plant-show-network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build: ./backend
    container_name: plant-show-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-plant_show}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_JWT_EXPIRES_IN: ${ADMIN_JWT_EXPIRES_IN:-1d}
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
      PRISMA_ENGINES_MIRROR: https://registry.npmmirror.com/-/binary/prisma
      DISABLE_DEV_LOGIN: ${DISABLE_DEV_LOGIN:-true}
      RUN_SEED: ${RUN_SEED:-false}
      WECHAT_APPID: ${WECHAT_APPID:-}
      WECHAT_SECRET: ${WECHAT_SECRET:-}
      AMAP_KEY: ${AMAP_KEY:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - plant-show-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/stations']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: plant-show-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - plant-show-network

  certbot:
    image: docker.m.daocloud.io/certbot/certbot:latest
    container_name: plant-show-certbot
    profiles:
      - certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    networks:
      - plant-show-network
    entrypoint: '/bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;"'

volumes:
  mysql_data:
  uploads_data:
  certbot-www:
  certbot-conf:

networks:
  plant-show-network:
    driver: bridge
