version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: plant-wander-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: plant123
      MYSQL_DATABASE: plant_wander
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - plant-wander-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build: ./backend
    container_name: plant-wander-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://root:plant123@mysql:3306/plant_wander
      JWT_SECRET: plant-wander-jwt-secret-key-2024
      JWT_EXPIRES_IN: 7d
      ADMIN_JWT_SECRET: plant-wander-admin-jwt-secret-2024
      ADMIN_JWT_EXPIRES_IN: 1d
      PORT: 3000
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - plant-wander-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/stations"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: plant-wander-nginx
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - plant-wander-network

volumes:
  mysql_data:

networks:
  plant-wander-network:
    driver: bridge
